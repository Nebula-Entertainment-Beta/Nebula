name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build ripgrep nlohmann-json3-dev \
            xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DNEBULA_BUILD_DOCS=OFF \
            -DGLFW_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build

      - name: Layer checks
        run: |
          chmod +x scripts/check_nimbus_deps.sh scripts/check_include_layers.sh scripts/check_editor_deps.sh
          ./scripts/check_nimbus_deps.sh
          ./scripts/check_include_layers.sh
          ./scripts/check_editor_deps.sh

      - name: Build NebulaEditor
        run: cmake --build build --target NebulaEditor

      - name: Build NimbusEditor
        run: cmake --build build --target NimbusEditor
      # .github/workflows/ci.yml — optional explicit step
      - name: Build NebulaEditor
        run: cmake --build build --target NebulaEditor
