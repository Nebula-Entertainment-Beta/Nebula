name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ripgrep nlohmann-json3-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Layer checks
        run: |
          chmod +x scripts/check_nimbus_deps.sh scripts/check_include_layers.sh
          ./scripts/check_nimbus_deps.sh
          ./scripts/check_include_layers.sh
